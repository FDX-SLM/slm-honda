# Shared configuration: base model, paths, seed, tracking, data contract.
# Other config files declare `defaults: base.yaml` and override the sections they need.
# Honda Entitlement Resolver PoC (PoC6). Train one shared dataset onto 4 base models via --base.

model_name: "Qwen/Qwen3.5-9B"   # default base (override per run with --base qwen|gemma|phi|granite)
output_dir: "checkpoints"
report_dir: "outputs"
seed: 42

tracking:
  langfuse: true                  # sample generations logged when LANGFUSE_* keys are present in .env

data:
  dir: "data"
  keep_audit_status: ["approved"] # only train on approved records
  lang: "en"                      # data + runbook + output are English (PoC §0)
  holdout_dir: null               # null → use the in-memory sft.val_split; set to a dir after split_holdout.py
  val_fraction: 0.10
  val_min_total: 60
  pref_val_fraction: 0.10
  pref_val_min_total: 12
