# T3 — DPO alignment (2-pass). Use when < 800 preference pairs.
# DPO REQUIRES an SFT checkpoint as its starting point (pass --sft-checkpoint or set below).
# See docs/SPEC.md §1, §9 and .claude/rules/training.md.
defaults: base.yaml

run_name: "align_dpo"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"
  bias: "none"

quant:
  load_in_4bit: true

model:
  max_seq_len: 4096
  attn_implementation: "flash_attention_2"
  use_unsloth: true
  dtype: "bfloat16"

align:
  method: "dpo"                   # < 800 pairs -> DPO
  beta: 0.1
  lr: 5.0e-6
  epochs: 1
  max_length: 2048
  max_prompt_length: 1024

batch_size: 2
grad_accum: 8

train:
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "rubric_avg"
  greater_is_better: true
  early_stopping_patience: 3
  warmup_ratio: 0.03
  max_seq_len: 2048

# Starting point for DPO. Override on the CLI with --sft-checkpoint.
sft_checkpoint: "checkpoints/sft_multistage/best"
