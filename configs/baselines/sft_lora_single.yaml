# Baseline corner: LoRA (16-bit) + single-stage SFT.  Run with scripts/train_sft.py
# Identical hyperparameters to the other baseline corners — ONLY quant + stages differ.
defaults: ../base.yaml

run_name: "bl_lora_single"
seed: 1308

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: "all-linear"
  bias: "none"

quant:
  load_in_4bit: false              # <-- LoRA (16-bit)

model:
  max_seq_len: 4096
  attn_implementation: "sdpa"
  use_unsloth: true
  dtype: "bfloat16"

sft:
  epochs: 1
  lr: 2.0e-4
  batch_size: 8
  grad_accum: 2
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  optim: "adamw_torch"
  gradient_checkpointing: true
  use_liger_kernel: true
  max_seq_len: 4096
  train_on_responses_only: true
  multiturn_masking: true
  packing: false
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "rubric_avg"
  greater_is_better: true
  early_stopping_patience: 3
  mixture:
    multi_turn: 0.66
    single: 0.34

eval_during_training:
  enabled: true
  gold_subset: "data/gold/gold_test.jsonl"
  subset_size: 32
  max_new_tokens: 512
  use_judge: false
