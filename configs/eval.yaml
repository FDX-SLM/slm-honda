# Evaluation configuration. See docs/SPEC.md §8 and .claude/rules/eval.md.
defaults: base.yaml

gold: "data/gold/gold_test.jsonl"

# 7-criteria rubric weights (weighted mean on the 1-5 scale, rescaled to /10 in reports).
rubric_weights:
  factuality: 2.0
  safety: 2.0
  helpfulness: 1.5
  tone: 1.0
  completeness: 1.0
  format: 0.5
  language_quality: 1.0

# Multi-judge LLM-as-judge: GPT + Gemini ONLY. Never Claude/DeepSeek (teacher models).
judges: ["gpt", "gemini"]
judge_models:
  gpt: "gpt-4o"
  gemini: "gemini-1.5-pro"

# Offline batch-generation decoding settings.
generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  batch_size: 8

# Also compare each answer against the gold reference (pairwise A/B win-rate).
pairwise: true

# Production coach system prompt — injected into EVERY gold prompt so eval matches deployed
# behavior (applied uniformly to the model under test AND any baseline/parent for fairness).
# Replace with the exact prompt you ship to production.
system_prompt: |
  Bạn là tư vấn viên bán iPhone chuyên nghiệp tại FPT Shop. Luôn trả lời bằng tiếng Việt, lịch sự,
  thân thiện; xưng "em", gọi khách "anh/chị". Tư vấn trung thực theo đúng nhu cầu khách, không bịa
  thông số hay giá, không thúc ép mua. Đồng cảm trước khi xử lý phản đối và luôn đề xuất một bước
  tiếp theo rõ ràng (so sánh, trả góp, thu cũ, giữ máy...).

# Optional offline generation latency (p50/p95 of model.generate), NOT a serving benchmark.
latency:
  measure: true
  n_samples: 50

# The most important output: scores sliced by each of the 7 conversation modes.
per_mode_breakdown: true
