# Local smoke test — small base model + tiny settings so the full T1 SFT loop runs end-to-end
# fast. Values below are tuned for a small CUDA GPU (e.g. RTX 5060 8GB).
#   uv run python scripts/train_sft.py --config configs/sft_lora_smoke.yaml
# On CPU instead: set dtype: "float32", attn_implementation: "eager".
defaults: base.yaml

run_name: "sft_lora_smoke"
model_name: "Qwen/Qwen2.5-1.5B"   # RAM/VRAM thấp -> đổi "Qwen/Qwen2.5-0.5B"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"
  bias: "none"

quant:
  load_in_4bit: false              # bf16 LoRA (1.5B ~3GB, vừa 8GB). Test QLoRA -> true (cần bitsandbytes hỗ trợ Blackwell).

model:
  max_seq_len: 1024
  attn_implementation: "sdpa"      # GPU: sdpa. FA2 trên Windows khó cài. CPU -> "eager".
  use_unsloth: false               # Unsloth chỉ chạy Linux+CUDA. Windows -> false (tự dùng transformers).
  dtype: "bfloat16"                # GPU -> bfloat16. CPU -> float32.

sft:
  epochs: 1
  max_steps: 60                    # smoke ngắn. Train thật -> bỏ max_steps hoặc tăng vài trăm/epochs.
  lr: 2.0e-4
  batch_size: 2
  grad_accum: 2
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler_type: "cosine"
  max_seq_len: 1024
  train_on_responses_only: true
  multiturn_masking: false         # smoke: tắt assistant-only mask (cần template hỗ trợ). Thật -> true.
  packing: false
  save_steps: 20
  eval_steps: 20
  logging_steps: 2
  save_total_limit: 1
  load_best_model_at_end: true
  metric_for_best_model: "rubric_avg"
  greater_is_better: true
  early_stopping_patience: 2
  mixture:
    multi_turn: 0.66
    single: 0.34

eval_during_training:
  enabled: true
  gold_subset: "data/gold/gold_test.jsonl"
  subset_size: 4
  max_new_tokens: 64
  use_judge: false
